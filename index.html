<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Spine Morphing & Tapering</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #0b0f19;
        font-family: sans-serif;
      }
      canvas {
        display: block;
      }

      #ui-container {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(11, 15, 25, 0.9);
        padding: 15px 25px;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      input[type="range"] {
        width: 300px;
        cursor: pointer;
      }
      label {
        font-size: 14px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="ui-container">
      <label for="growthSlider"
        >Spine Growth & Deformity: <span id="growthVal">50</span>%</label
      >
      <input type="range" id="growthSlider" min="5" max="100" value="50" />
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      // --- Scene Setup ---
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.set(0, 4, 14);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      // --- Grid Helper for Visual Reference ---
      const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
      gridHelper.position.y = -5;
      scene.add(gridHelper);

      // --- Material ---
      // Using Normal Material so you can easily see the geometric contours and taper shifts
      const trunkMaterial = new THREE.MeshNormalMaterial({
        side: THREE.DoubleSide,
        wireframe: false, // Set to true if you want to inspect the raw polygon topology
      });

      // --- Growth Configuration ---
      const slider = document.getElementById("growthSlider");
      const sliderValDisplay = document.getElementById("growthVal");

      let currentGrowth = slider.value / 100;
      let currentGeometry = null;

      let treeTrunkMesh = new THREE.Mesh(
        new THREE.BufferGeometry(),
        trunkMaterial,
      );
      scene.add(treeTrunkMesh);

      // The initial neutral backbone nodes of our tree
      const basePointsConfig = [
        { x: 0, y: -5, z: 0 }, // Root (Strictly anchored)
        { x: 0, y: -2, z: 0 },
        { x: 0, y: 1, z: 0 },
        { x: 0, y: 4, z: 0 },
        { x: 0, y: 7, z: 0 }, // Tip
      ];

      // --- Dynamic Growth and Path Morphing Engine ---
      function updateTreeGeometry(growth) {
        const points = [];
        const segments = 64;
        const radialSegments = 16;

        // 1. GENERATE MORPHING PATH CONTROL POINTS
        basePointsConfig.forEach((pt, index) => {
          // Scale height upwards based on growth factor
          const currentY = -5 + (pt.y - -5) * growth;

          let morphX = 0;
          let morphZ = 0;

          if (index > 0) {
            // Introduce a phase shift for each node using trigonometry.
            // Changing the frequency and multiplying it by the growth variable
            // causes the path to actively warp, snake, and re-route as it transitions.
            morphX =
              Math.sin(index * 1.5 + growth * Math.PI * 1.5) *
              (index * 0.4) *
              growth;
            morphZ =
              Math.cos(index * 2.0 + growth * Math.PI * 1.2) *
              (index * 0.3) *
              growth;
          }

          points.push(new THREE.Vector3(morphX, currentY, morphZ));
        });

        // Feed morphing nodes into the spline generator
        const trunkSpine = new THREE.CatmullRomCurve3(points);

        // 2. DYNAMIC RADIUS CALCULATIONS
        const baseRadius = THREE.MathUtils.lerp(0.1, 1.2, growth);

        if (currentGeometry) currentGeometry.dispose();

        // Generate standard extruded framework
        currentGeometry = new THREE.TubeGeometry(
          trunkSpine,
          segments,
          baseRadius,
          radialSegments,
          false,
        );

        // 3. APPLY TAPER ALONG GENERATED PATH
        const positionAttribute = currentGeometry.attributes.position;
        const vertex = new THREE.Vector3();

        for (let i = 0; i <= segments; i++) {
          const progression = i / segments;

          // Taper profile formulation:
          // Base retains full thickness factor (1.0). Top pinches heavily based on progression.
          // As the tree reaches maturity, the taper accentuates.
          const taperFactor =
            1.0 - progression * 0.85 * Math.min(1.0, growth + 0.1);

          const centerPoint = trunkSpine.getPointAt(progression);

          for (let j = 0; j <= radialSegments; j++) {
            const vertexIndex = i * (radialSegments + 1) + j;

            if (vertexIndex < positionAttribute.count) {
              vertex.fromBufferAttribute(positionAttribute, vertexIndex);

              // Scale vertex relative to its position on the spine path
              vertex.sub(centerPoint);
              vertex.multiplyScalar(taperFactor);
              vertex.add(centerPoint);

              positionAttribute.setXYZ(
                vertexIndex,
                vertex.x,
                vertex.y,
                vertex.z,
              );
            }
          }
        }

        // Flag system updates
        positionAttribute.needsUpdate = true;
        currentGeometry.computeVertexNormals();

        treeTrunkMesh.geometry = currentGeometry;
      }

      // Initialize First Pass
      updateTreeGeometry(currentGrowth);

      // --- Event Listener for UI Slider ---
      slider.addEventListener("input", (e) => {
        const val = e.target.value;
        sliderValDisplay.innerText = val;
        currentGrowth = val / 100;
        updateTreeGeometry(currentGrowth);
      });

      // --- Animation Loop ---
      function animate() {
        requestAnimationFrame(animate);

        // Soft rotation to observe the shifting 3D profile
        treeTrunkMesh.rotation.y += 0.003;

        controls.update();
        renderer.render(scene, camera);
      }

      animate();

      // --- Handle Window Resize ---
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
