<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>High Fidelity Textured L-System Tree with HDR</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="perf-monitor">
      <div>
        <span class="perf-label">FPS:</span> <span id="fps-val">--</span>
      </div>
      <div>
        <span class="perf-label">Rebuild Time:</span>
        <span id="rebuild-val">0.00</span> ms
      </div>
    </div>

    <div id="ui-container">
      <label>Canopy Density Growth Stage</label>
      <div class="btn-group">
        <button class="stage-btn active" data-val="0">0%</button>
        <button class="stage-btn" data-val="25">25%</button>
        <button class="stage-btn" data-val="50">50%</button>
        <button class="stage-btn" data-val="75">75%</button>
        <button class="stage-btn" data-val="100">100%</button>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
