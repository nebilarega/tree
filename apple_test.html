<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural L-System Apple Tree Control</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #141414;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      #control-panel {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(20, 20, 20, 0.85);
        border: 1px solid #333;
        padding: 15px 25px;
        border-radius: 30px;
        display: flex;
        align-items: center;
        gap: 15px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        z-index: 10;
      }
      .label {
        color: #e0e0e0;
        font-size: 14px;
        font-weight: 600;
        min-width: 45px;
      }
      input[type="range"] {
        -webkit-appearance: none;
        width: 200px;
        background: #333;
        height: 6px;
        border-radius: 3px;
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #b51a1a;
        cursor: pointer;
        transition: transform 0.1s;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
      button {
        background: #b51a1a;
        border: none;
        color: white;
        padding: 8px 16px;
        border-radius: 15px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
        transition: background 0.2s;
      }
      button:hover {
        background: #d62424;
      }
    </style>
    <script
      async
      src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="control-panel">
      <span class="label">Growth</span>
      <input type="range" id="growth-slider" min="0" max="100" value="70" />
      <span class="label" id="percentage-display">70%</span>
      <button id="btn-mature">Maturity (100%)</button>
      <button id="btn-reset">Seed (0%)</button>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import * as BufferGeometryUtils from "three/addons/utils/BufferGeometryUtils.js";

      const leafPalettes = [
        new THREE.Color("#245c32"),
        new THREE.Color("#3b8c4c"),
        new THREE.Color("#5ea351"),
        new THREE.Color("#4a7c59"),
        new THREE.Color("#a89744"),
      ];

      class Tree {
        constructor(scene) {
          this.scene = scene;
          this.group = new THREE.Group();
          this.scene.add(this.group);

          this.barkTexture = this._createProceduralBarkTexture();
          this.trunkMaterial = new THREE.MeshStandardMaterial({
            map: this.barkTexture,
            bumpMap: this.barkTexture,
            bumpScale: 0.05,
            roughness: 0.7,
            metalness: 0.0,
          });

          this.leafMaterial = new THREE.MeshStandardMaterial({
            roughness: 0.5,
            metalness: 0.0,
            side: THREE.DoubleSide,
          });
          this._initWindShader();

          this.appleMaterial = new THREE.MeshStandardMaterial({
            color: new THREE.Color("#b51a1a"),
            roughness: 0.15,
            metalness: 0.1,
          });

          this.baseCylinderGeo = new THREE.CylinderGeometry(
            0.55,
            1,
            1,
            5,
            1,
            false,
          );
          this.baseCylinderGeo.translate(0, 0.5, 0);

          this.leafClumpGeometry = this._createLeafClumpGeometry();
          this.appleGeometry = new THREE.SphereGeometry(0.16, 8, 8);
          this.appleGeometry.translate(0, -0.12, 0);

          this.leafTransforms = [];
          this.leafColors = [];
          this.appleTransforms = [];
          this.branchGeometries = [];
          this.instancedTwigTransforms = [];

          this._vertex = new THREE.Vector3();
          this._radialDir = new THREE.Vector3();
          this._centerPoint = new THREE.Vector3();
          this._upRef = new THREE.Vector3(0, 1, 0);
          this._scratchVec1 = new THREE.Vector3();
          this._scratchVec2 = new THREE.Vector3();
          this._scratchQuat = new THREE.Quaternion();
          this._scratchScale = new THREE.Vector3();
          this._scratchMatrix = new THREE.Matrix4();
        }

        _initWindShader() {
          this.leafMaterial.onBeforeCompile = (shader) => {
            shader.uniforms.time = { value: 0 };
            this.leafMaterial.userData.shader = shader;
            shader.vertexShader = `uniform float time;\n` + shader.vertexShader;
            shader.vertexShader = shader.vertexShader.replace(
              "#include <begin_vertex>",
              `
                        #include <begin_vertex>
                        float localWind = sin(time * 2.0 + position.y * 5.0 + position.x * 2.0) * 0.02;
                        float globalWind = sin(time * 0.8) * 0.015;
                        float swayScale = clamp(length(position) * 1.5, 0.0, 1.0);
                        transformed.x += (localWind + globalWind) * swayScale;
                        transformed.z += (localWind * 0.5 + globalWind) * swayScale;
                        `,
            );
          };
        }

        _createProceduralBarkTexture() {
          const canvas = document.createElement("canvas");
          canvas.width = 256;
          canvas.height = 256;
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#4a3321";
          ctx.fillRect(0, 0, 256, 256);
          for (let i = 0; i < 400; i++) {
            ctx.fillStyle = Math.random() > 0.5 ? "#261910" : "#3b281a";
            ctx.fillRect(
              Math.random() * 256,
              Math.random() * 256,
              4 + Math.random() * 6,
              20 + Math.random() * 60,
            );
          }
          const texture = new THREE.CanvasTexture(canvas);
          texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
          texture.repeat.set(1, 3);
          return texture;
        }

        _createLeafClumpGeometry() {
          const baseLeafShape = new THREE.Shape();
          baseLeafShape.moveTo(0, 0);
          baseLeafShape.quadraticCurveTo(0.15, 0.15, 0.12, 0.4);
          baseLeafShape.quadraticCurveTo(0.05, 0.7, 0, 0.85);
          baseLeafShape.quadraticCurveTo(-0.05, 0.7, -0.12, 0.4);
          baseLeafShape.quadraticCurveTo(-0.15, 0.15, 0, 0);

          const singleLeafGeo = new THREE.ShapeGeometry(baseLeafShape);
          const posAttr = singleLeafGeo.attributes.position;
          const uvs = new Float32Array(posAttr.count * 2);
          for (let i = 0; i < posAttr.count; i++) {
            uvs[i * 2] = (posAttr.getX(i) + 0.15) / 0.3;
            uvs[i * 2 + 1] = posAttr.getY(i) / 0.85;
          }
          singleLeafGeo.setAttribute("uv", new THREE.BufferAttribute(uvs, 2));

          const leafGeometries = [];
          for (let i = 0; i < 6; i++) {
            const leafCopy = singleLeafGeo.clone();
            const angle = (i / 6) * Math.PI * 2;
            const dummy = new THREE.Object3D();
            dummy.position.set(
              Math.cos(angle) * 0.2,
              (Math.random() - 0.5) * 0.04,
              Math.sin(angle) * 0.2,
            );
            dummy.rotation.set(
              0.2 + Math.random() * 0.2,
              angle,
              0.1 * (Math.random() - 0.5),
            );
            const scale = 0.5 + Math.random() * 0.2;
            dummy.scale.set(scale * 1.2, scale, scale);
            dummy.updateMatrix();
            leafCopy.applyMatrix4(dummy.matrix);
            leafGeometries.push(leafCopy);
          }
          const merged = BufferGeometryUtils.mergeGeometries(leafGeometries);
          singleLeafGeo.dispose();
          leafGeometries.forEach((g) => g.dispose());
          return merged;
        }

        rebuild(growthValue) {
          if (growthValue <= 0.01) {
            this.group.clear();
            return;
          }

          this.group.traverse((child) => {
            if (child.isMesh || child.isInstancedMesh) {
              if (
                child.geometry &&
                child.geometry !== this.baseCylinderGeo &&
                child.geometry !== this.leafClumpGeometry &&
                child.geometry !== this.appleGeometry
              ) {
                child.geometry.dispose();
              }
            }
          });
          this.group.clear();

          this.leafTransforms = [];
          this.leafColors = [];
          this.appleTransforms = [];
          this.branchGeometries = [];
          this.instancedTwigTransforms = [];

          const baseTrunkStart = new THREE.Vector3(0, -2, 0);
          const baseTrunkDir = new THREE.Vector3(0, 1, 0);

          const currentTrunkLen = 5.5 * Math.min(1.0, growthValue * 1.3);
          const currentTrunkRadius = 0.4 * Math.log1p(growthValue * 1.8);

          this._generateLSystem(
            baseTrunkStart,
            baseTrunkDir,
            currentTrunkLen,
            currentTrunkRadius,
            0,
            5,
            growthValue,
          );

          if (this.branchGeometries.length > 0) {
            const merged = BufferGeometryUtils.mergeGeometries(
              this.branchGeometries,
            );
            const mesh = new THREE.Mesh(merged, this.trunkMaterial);
            mesh.castShadow = mesh.receiveShadow = true;
            this.group.add(mesh);
            this.branchGeometries.forEach((g) => g.dispose());
            this.branchGeometries = [];
          }

          if (this.instancedTwigTransforms.length > 0) {
            const mesh = new THREE.InstancedMesh(
              this.baseCylinderGeo,
              this.trunkMaterial,
              this.instancedTwigTransforms.length,
            );
            mesh.castShadow = mesh.receiveShadow = true;
            for (let i = 0; i < this.instancedTwigTransforms.length; i++)
              mesh.setMatrixAt(i, this.instancedTwigTransforms[i]);
            mesh.instanceMatrix.needsUpdate = true;
            this.group.add(mesh);
          }

          if (this.leafTransforms.length > 0) {
            const mesh = new THREE.InstancedMesh(
              this.leafClumpGeometry,
              this.leafMaterial,
              this.leafTransforms.length,
            );
            mesh.castShadow = mesh.receiveShadow = true;
            for (let i = 0; i < this.leafTransforms.length; i++) {
              mesh.setMatrixAt(i, this.leafTransforms[i]);
              mesh.setColorAt(i, this.leafColors[i]);
            }
            mesh.instanceMatrix.needsUpdate = true;
            if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
            this.group.add(mesh);
          }

          if (this.appleTransforms.length > 0) {
            const mesh = new THREE.InstancedMesh(
              this.appleGeometry,
              this.appleMaterial,
              this.appleTransforms.length,
            );
            mesh.castShadow = mesh.receiveShadow = true;
            for (let i = 0; i < this.appleTransforms.length; i++)
              mesh.setMatrixAt(i, this.appleTransforms[i]);
            mesh.instanceMatrix.needsUpdate = true;
            this.group.add(mesh);
          }
        }

        updateWind(time) {
          if (this.leafMaterial.userData.shader) {
            this.leafMaterial.userData.shader.uniforms.time.value = time;
          }
        }

        _createBranchGeometry(
          curve,
          startRadius,
          endRadius,
          parentRadius,
          segments,
          radialSegments,
          isTrunk = false,
        ) {
          const geometry = new THREE.TubeGeometry(
            curve,
            segments,
            startRadius,
            radialSegments,
            false,
          );
          const posAttr = geometry.attributes.position;
          const targetBaseRadius =
            startRadius + (parentRadius - startRadius) * 0.45;

          for (let i = 0; i <= segments; i++) {
            const progression = i / segments;
            const standardRadius = THREE.MathUtils.lerp(
              startRadius,
              endRadius,
              progression,
            );
            const flareDropoff = Math.exp(-progression * 6.0);
            let actualRadius = THREE.MathUtils.lerp(
              standardRadius,
              targetBaseRadius,
              flareDropoff,
            );

            if (isTrunk && progression > 0.9) {
              actualRadius *= THREE.MathUtils.mapLinear(
                progression,
                0.9,
                1.0,
                1.0,
                0.3,
              );
            }

            curve.getPointAt(progression, this._centerPoint);
            for (let j = 0; j <= radialSegments; j++) {
              const idx = i * (radialSegments + 1) + j;
              if (idx < posAttr.count) {
                this._vertex.fromBufferAttribute(posAttr, idx);
                this._radialDir
                  .copy(this._vertex)
                  .sub(this._centerPoint)
                  .normalize();
                this._vertex
                  .copy(this._centerPoint)
                  .addScaledVector(this._radialDir, actualRadius);
                posAttr.setXYZ(
                  idx,
                  this._vertex.x,
                  this._vertex.y,
                  this._vertex.z,
                );
              }
            }
          }
          posAttr.needsUpdate = true;
          geometry.computeVertexNormals();
          return geometry;
        }

        _generateLSystem(
          startPos,
          direction,
          length,
          radius,
          currentDepth,
          maxDepth,
          growthFactor,
          parentRadius = null,
        ) {
          if (currentDepth > maxDepth || length < 0.01 || radius < 0.001)
            return;

          const endPos = new THREE.Vector3()
            .copy(startPos)
            .addScaledVector(direction, length);
          let curveAxis = new THREE.Vector3(0, 1, 0)
            .cross(direction)
            .normalize();
          if (curveAxis.lengthSq() < 0.001) curveAxis.set(1, 0, 0);
          const secondaryAxis = new THREE.Vector3()
            .copy(curveAxis)
            .cross(direction)
            .normalize();

          const cp1 = new THREE.Vector3();
          const cp2 = new THREE.Vector3();

          if (currentDepth === 0) {
            const wobble = growthFactor * 1.0;
            cp1.copy(startPos).addScaledVector(direction, length * 0.35);
            cp2
              .copy(startPos)
              .addScaledVector(direction, length * 0.7)
              .add(this._scratchVec1.set(wobble, 0, wobble * 0.5));
          } else {
            const offset = length * 0.35;
            cp1.copy(startPos).addScaledVector(direction, length * 0.33);
            cp2
              .copy(startPos)
              .addScaledVector(direction, length * 0.66)
              .addScaledVector(curveAxis, offset)
              .addScaledVector(secondaryAxis, offset * 0.2);
          }

          const branchCurve = new THREE.CubicBezierCurve3(
            startPos,
            cp1,
            cp2,
            endPos,
          );
          let segments = 2,
            radialSegments = 3;

          if (currentDepth === 0) {
            segments = 24;
            radialSegments = 10;
          } else if (currentDepth === 1) {
            segments = 12;
            radialSegments = 6;
          } else if (currentDepth === 2) {
            segments = 6;
            radialSegments = 4;
          }

          const targetEndRadius =
            currentDepth === 0 ? radius * 0.45 : radius * 0.55;

          if (currentDepth >= 4) {
            const matrix = new THREE.Matrix4();
            this._upRef.set(0, 1, 0);
            this._scratchQuat.setFromUnitVectors(this._upRef, direction);
            this._scratchScale.set(radius, length, radius);
            matrix.compose(startPos, this._scratchQuat, this._scratchScale);
            this.instancedTwigTransforms.push(matrix);
          } else {
            const branchGeo = this._createBranchGeometry(
              branchCurve,
              radius,
              targetEndRadius,
              parentRadius === null ? radius * 1.15 : parentRadius,
              segments,
              radialSegments,
              currentDepth === 0,
            );
            this.branchGeometries.push(branchGeo);
          }

          const nextDepth = currentDepth + 1;
          const nextLength = currentDepth === 0 ? length * 0.65 : length * 0.72;
          const nextRadius = radius * 0.48;

          if (currentDepth === 3 && growthFactor > 0.15) {
            const fineAvailability = THREE.MathUtils.clamp(
              (growthFactor - 0.15) / 0.55,
              0.0,
              1.0,
            );
            for (let k = 1; k <= segments; k++) {
              const splitProgress = k / segments;
              const splitOrigin = branchCurve.getPointAt(splitProgress);
              const seed = currentDepth * 3000 + k * 51.17;
              const angle = k * 2.39996 + Math.cos(seed * 0.7) * 0.3;
              const fineDir = new THREE.Vector3(
                Math.cos(angle) * 0.5,
                0.5,
                Math.sin(angle) * 0.5,
              ).normalize();
              const localGrowth = Math.min(1.0, fineAvailability * 1.6);

              this._generateLSystem(
                splitOrigin,
                fineDir,
                nextLength * localGrowth,
                nextRadius * Math.pow(localGrowth, 1.2),
                nextDepth,
                maxDepth,
                growthFactor,
                THREE.MathUtils.lerp(radius, targetEndRadius, splitProgress),
              );
            }
          }

          // Node final-stage decoration engine
          if (currentDepth === 4 && growthFactor > 0.25) {
            const leafProgression = THREE.MathUtils.clamp(
              (growthFactor - 0.25) / 0.45,
              0.0,
              1.0,
            );
            const stepDelta = Math.max(1, Math.floor(segments / 4));

            for (let k = 1; k <= segments; k += stepDelta) {
              const progress = k / segments;
              const leafPos = branchCurve.getPointAt(progress);
              const branchForward = branchCurve
                .getTangentAt(progress)
                .normalize();

              let structureScaleFactor =
                Math.sin(progress * Math.PI) * leafProgression;

              if (structureScaleFactor >= 0.01) {
                let referenceUp = this._upRef.set(0, 1, 0);
                if (Math.abs(branchForward.dot(referenceUp)) > 0.95)
                  referenceUp.set(1, 0, 0);

                const branchRight = this._scratchVec1
                  .crossVectors(branchForward, referenceUp)
                  .normalize();
                const branchUp = this._scratchVec2
                  .crossVectors(branchRight, branchForward)
                  .normalize();

                for (let l = 0; l < 4; l++) {
                  const seed = currentDepth * 4000 + (k * 4 + l) * 53.17;
                  const randA = Math.sin(seed * 0.5 + 0.5);
                  const randB = Math.cos(seed * 1.4) * 0.5 + 0.5;
                  const scatterAngle = (l / 4) * Math.PI * 2;
                  const spreadRadius = radius * (0.6 + randB * 0.8);

                  const finalLeafPos = new THREE.Vector3()
                    .copy(leafPos)
                    .addScaledVector(
                      branchRight,
                      Math.cos(scatterAngle) * spreadRadius,
                    )
                    .addScaledVector(
                      branchUp,
                      Math.sin(scatterAngle) * spreadRadius,
                    );

                  this._scratchMatrix.makeBasis(
                    branchRight,
                    branchUp,
                    branchForward,
                  );
                  this._scratchMatrix.setPosition(finalLeafPos);

                  const leafScale =
                    (0.4 + randA * 0.3) * structureScaleFactor * 1.2;
                  this._scratchScale.set(leafScale, leafScale, leafScale);
                  this._scratchMatrix.scale(this._scratchScale);
                  this.leafTransforms.push(this._scratchMatrix.clone());

                  const color = leafPalettes[
                    Math.floor(randB * leafPalettes.length)
                  ]
                    .clone()
                    .offsetHSL((randA - 0.5) * 0.05, 0, (randA - 0.5) * 0.08);
                  this.leafColors.push(color);

                  // Normalized Fruit Spawn logic: visible from 60% up to 100% maturity
                  if (growthFactor > 0.6 && l === 0 && randB > 0.85) {
                    const appleMatrix = new THREE.Matrix4();
                    const gravityDir = new THREE.Vector3(0, -1, 0);
                    let fwd = new THREE.Vector3(1, 0, 0)
                      .cross(branchForward)
                      .normalize();
                    if (fwd.lengthSq() < 0.001) fwd.set(0, 0, 1);

                    appleMatrix.makeBasis(
                      new THREE.Vector3()
                        .crossVectors(fwd, gravityDir)
                        .normalize(),
                      gravityDir,
                      fwd,
                    );
                    appleMatrix.setPosition(
                      this._scratchVec1
                        .copy(finalLeafPos)
                        .addScaledVector(gravityDir, 0.05),
                    );

                    const appleGrowthProgression = THREE.MathUtils.clamp(
                      (growthFactor - 0.6) / 0.4,
                      0.0,
                      1.0,
                    );
                    const fruitScale =
                      appleGrowthProgression * (0.6 + randA * 0.4);

                    this._scratchScale.set(fruitScale, fruitScale, fruitScale);
                    appleMatrix.scale(this._scratchScale);
                    this.appleTransforms.push(appleMatrix);
                  }
                }
              }
            }
          }

          if (currentDepth === 0 && growthFactor > 0.01) {
            const branchAvailability = (growthFactor - 0.01) / 0.99;
            const numSplits = 8;
            for (let i = 0; i < numSplits; i++) {
              const localSeed = i * 43.19;
              const splitProgress = 0.4 + (i / numSplits) * 0.45;
              const splitOrigin = branchCurve.getPointAt(splitProgress);
              const angle = i * 2.39996 + Math.cos(localSeed * 1.7) * 0.2;
              const pitch = THREE.MathUtils.clamp(
                0.4 + (i / numSplits) * 0.2,
                0.3,
                0.7,
              );
              const branchDir = new THREE.Vector3(
                Math.cos(angle) * (1.0 - pitch),
                pitch,
                Math.sin(angle) * (1.0 - pitch),
              ).normalize();
              const localBranchGrowth = Math.min(
                1.0,
                THREE.MathUtils.clamp(
                  (branchAvailability - (i / numSplits) * 0.1) /
                    (1.0 - (i / numSplits) * 0.1),
                  0,
                  1,
                ) * 1.4,
              );

              if (localBranchGrowth > 0.01) {
                this._generateLSystem(
                  splitOrigin,
                  branchDir,
                  nextLength * localBranchGrowth,
                  nextRadius * Math.pow(localBranchGrowth, 1.2),
                  nextDepth,
                  maxDepth,
                  growthFactor,
                  THREE.MathUtils.lerp(radius, targetEndRadius, splitProgress),
                );
              }
            }
          }

          if (currentDepth === 1 && growthFactor > 0.15) {
            for (let i = 0; i < 2; i++) {
              const splitProgress = 0.4 + i * 0.3;
              const splitOrigin = branchCurve.getPointAt(splitProgress);
              const parentTangent = branchCurve.getTangentAt(splitProgress);
              const side = new THREE.Vector3(0, 1, 0)
                .cross(parentTangent)
                .normalize();
              const twigDir = new THREE.Vector3()
                .copy(parentTangent)
                .addScaledVector(side, (i === 0 ? 1 : -1) * 0.75)
                .normalize();
              const localTwigGrowth = Math.min(
                1.0,
                ((growthFactor - 0.15) / 0.85) * 1.4,
              );

              this._generateLSystem(
                splitOrigin,
                twigDir,
                nextLength * localTwigGrowth,
                nextRadius * Math.pow(localTwigGrowth, 1.2),
                nextDepth,
                maxDepth,
                growthFactor,
                THREE.MathUtils.lerp(radius, targetEndRadius, splitProgress),
              );
            }
          }
        }
      }

      // --- Core Application Context Setup ---
      const scene = new THREE.Scene();
      scene.background = new THREE.Color("#111111");

      const camera = new THREE.PerspectiveCamera(
        40,
        window.innerWidth / window.innerHeight,
        0.1,
        100,
      );
      camera.position.set(0, 3, 14);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.target.set(0, 1, 0);

      scene.add(new THREE.AmbientLight("#ffffff", 0.5));
      const sunLight = new THREE.DirectionalLight("#fffaed", 1.5);
      sunLight.position.set(10, 20, 10);
      sunLight.castShadow = true;
      sunLight.shadow.mapSize.set(2048, 2048);
      scene.add(sunLight);

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(50, 50),
        new THREE.MeshStandardMaterial({ color: "#1a1a1a", roughness: 0.9 }),
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -2;
      floor.receiveShadow = true;
      scene.add(floor);

      const tree = new Tree(scene);

      let currentGrowth = 0.0;
      let targetGrowth = 0.7; // Initialize at 70% to instantly verify foliage/fruit visibility

      const slider = document.getElementById("growth-slider");
      const display = document.getElementById("percentage-display");

      slider.addEventListener("input", (e) => {
        targetGrowth = parseFloat(e.target.value) / 100;
        display.innerText = `${e.target.value}%`;
      });

      document.getElementById("btn-mature").addEventListener("click", () => {
        targetGrowth = 1.0;
        slider.value = 100;
        display.innerText = "100%";
      });

      document.getElementById("btn-reset").addEventListener("click", () => {
        targetGrowth = 0.0;
        slider.value = 0;
        display.innerText = "0%";
      });

      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);
        controls.update();

        const delta = clock.getDelta();
        if (Math.abs(currentGrowth - targetGrowth) > 0.001) {
          currentGrowth = THREE.MathUtils.lerp(
            currentGrowth,
            targetGrowth,
            delta * 4.0,
          );
          tree.rebuild(currentGrowth);
        }

        tree.updateWind(clock.getElapsedTime());
        renderer.render(scene, camera);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // First render execution run
      tree.rebuild(targetGrowth);
      currentGrowth = targetGrowth;
      animate();
    </script>
  </body>
</html>
